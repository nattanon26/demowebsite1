<!DOCTYPE html>
<html>
<head>
    <title>Add Cake</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
            color: white;
            min-height: 100vh;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 60px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        nav h1 {
            font-size: 24px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            padding: 8px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            background: rgba(255,255,255,0.2);
        }

        /* CENTER BOX */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .box {
            width: 100%;
            max-width: 550px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            font-size: 14px;
            display: block;
            margin-bottom: 6px;
            opacity: 0.8;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        input:focus, select:focus {
            background: rgba(255,255,255,0.2);
        }

        /* IMAGE PREVIEW */
        .preview {
            margin-top: 10px;
            text-align: center;
        }

        .preview img {
            max-width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
            display: none;
            margin-top: 10px;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff7eb3, #ff758c);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255,118,150,0.4);
        }

        .back {
            text-align: center;
            margin-top: 15px;
        }

        .back a {
            color: #ddd;
            text-decoration: none;
        }

        .back a:hover {
            color: white;
        }
    </style>
</head>
<body>

<nav>
    <h1>🍰 Cake Shop</h1>
    <div>
        <a href="/">Home</a>
    </div>
</nav>

<div class="container">
    <div class="box">
        <h2>➕ Add New Cake</h2>

        <form method="POST">
            <div class="form-group">
                <label>🍰 Cake Name</label>
                <input name="name" placeholder="Chocolate Cake" required>
            </div>

            <div class="form-group">
                <label>💰 Price</label>
                <input name="price" type="number" step="0.01" required>
            </div>

            <div class="form-group">
                <label>🖼️ Image URL</label>
                <input id="imageInput" name="image" placeholder="Paste image URL">
                
                <div class="preview">
                    <img id="previewImg">
                </div>
            </div>

            <div class="form-group">
                <label>📦 Stock</label>
                <input name="stock" type="number" value="0">
            </div>

            <div class="form-group">
                <label>🏷️ Category</label>
                <select name="category_id">
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit">🚀 Add Cake</button>
        </form>

        <div class="back">
            <a href="/">⬅️ Back</a>
        </div>
    </div>
</div>

<script>
    const input = document.getElementById("imageInput");
    const preview = document.getElementById("previewImg");

    input.addEventListener("input", () => {
        if(input.value){
            preview.src = input.value;
            preview.style.display = "block";
        } else {
            preview.style.display = "none";
        }
    });
</script>

</body>
</html>
